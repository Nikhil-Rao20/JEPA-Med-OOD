# Echo JEPA Configuration for Frame-level Pretraining
# Uses EchoNet-Dynamic ED/ES frames (~14,930 images)
# ViT-Small architecture for efficient training

data:
  batch_size: 4  # Further reduced to prevent GPU crash
  color_jitter_strength: 0.0  # No color jitter for echo images
  crop_scale:
  - 0.3
  - 1.0
  crop_size: 224
  # Path to EchoNet-Dynamic
  root_path: c:/Users/nikhi/Downloads/Med_JEPA_ODD/Datasets/Echo/EchoNet_Dynamic
  num_workers: 0  # Use 0 on Windows to avoid multiprocessing issues
  pin_mem: false  # Disable to reduce memory pressure
  gradient_accumulation_steps: 8  # Effective batch size = 4 * 8 = 32
  # Medical-specific: disable augmentations that could distort anatomy
  use_color_distortion: false
  use_gaussian_blur: false
  use_horizontal_flip: false  # Echo anatomy should not be flipped

logging:
  folder: c:/Users/nikhi/Downloads/Med_JEPA_ODD/experiments/echo_seg_pilot/jepa/
  write_tag: jepa_echo_vit_small

mask:
  allow_overlap: false
  aspect_ratio:
  - 0.75
  - 1.5
  # Context mask covers most of the image (85-100%)
  enc_mask_scale:
  - 0.85
  - 1.0
  min_keep: 10
  num_enc_masks: 1
  # Predict 4 target blocks (15-20% of image each)
  num_pred_masks: 4
  patch_size: 16
  pred_mask_scale:
  - 0.15
  - 0.2

meta:
  copy_data: false
  load_checkpoint: false
  # Use ViT-Small for faster training
  model_name: vit_small
  pred_depth: 6
  pred_emb_dim: 384
  read_checkpoint: null
  use_bfloat16: false

optimization:
  # EMA momentum schedule (start, end)
  ema:
  - 0.996
  - 1.0
  epochs: 50
  final_lr: 1.0e-06
  final_weight_decay: 0.4
  ipe_scale: 1.0
  lr: 0.0005
  start_lr: 0.0001
  warmup: 10
  weight_decay: 0.04
