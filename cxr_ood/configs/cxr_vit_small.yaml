# Medical JEPA Configuration for CXR Pretraining
# Optimized for small medical datasets (~1-5k images)
# Uses ViT-Small for faster training and lower memory usage

data:
  batch_size: 32  # Reduced for small dataset, single GPU
  color_jitter_strength: 0.0  # No color jitter for medical images
  crop_scale:
  - 0.3
  - 1.0
  crop_size: 224
  # Path to CXR datasets directory
  root_path: c:/Users/nikhi/Downloads/Med_JEPA_ODD/Datasets/CXR
  num_workers: 4
  pin_mem: true
  # Medical-specific: disable augmentations that could distort pathology
  use_color_distortion: false
  use_gaussian_blur: false
  use_horizontal_flip: false  # Keep false - anatomical structures should not be flipped
  # Dataset selection for training
  # Pretrain on TB_Chest_Radiography_Database only
  # OOD evaluation will be on Montgomery and Shenzhen (different hospital sources)
  datasets_to_use:
  - tb_database  # 8,400 images (TB/Normal)

logging:
  folder: c:/Users/nikhi/Downloads/Med_JEPA_ODD/experiments/cxr_jepa_pilot/
  write_tag: jepa_cxr_vit_small

mask:
  allow_overlap: false
  aspect_ratio:
  - 0.75
  - 1.5
  # Context mask covers most of the image (85-100%)
  enc_mask_scale:
  - 0.85
  - 1.0
  min_keep: 10
  num_enc_masks: 1
  # Predict 4 target blocks (15-20% of image each)
  num_pred_masks: 4
  patch_size: 16
  pred_mask_scale:
  - 0.15
  - 0.2

meta:
  copy_data: false
  load_checkpoint: false
  # Use ViT-Small for faster training on limited data
  model_name: vit_small
  # Predictor depth (smaller than original for faster training)
  pred_depth: 6
  pred_emb_dim: 384
  read_checkpoint: null
  use_bfloat16: false  # Set to false for better compatibility

optimization:
  # EMA momentum schedule (start, end)
  ema:
  - 0.996
  - 1.0
  # Reduced epochs for pilot testing (increase later)
  epochs: 50
  final_lr: 1.0e-06
  final_weight_decay: 0.4
  ipe_scale: 1.0
  # Learning rate (may need tuning)
  lr: 0.0005
  start_lr: 0.0001
  # Warmup epochs
  warmup: 10
  weight_decay: 0.04
